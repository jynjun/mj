<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MJ — Tous les logos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#06030a; --bg2:#0c0512; --red:#c41e3a; --gold:#d4a017;
      --text:#f5efe8; --text-muted:rgba(245,239,232,0.78); --text-dim:rgba(245,239,232,0.5);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { background:var(--bg); }
    body {
      min-height:100dvh; background:
        radial-gradient(ellipse 90% 40% at 50% 0%, rgba(140,15,30,0.18) 0%, transparent 60%),
        var(--bg);
      color:var(--text); font-family:'Crimson Text',Georgia,serif;
      -webkit-font-smoothing:antialiased; padding:48px 22px 72px;
    }
    .wrap { max-width:1080px; margin:0 auto; }
    .masthead { text-align:center; margin-bottom:48px; }
    .masthead .mark {
      font-family:'Cinzel',serif; font-size:clamp(56px,12vw,92px); font-weight:900;
      letter-spacing:0.22em; line-height:1; text-shadow:0 0 90px rgba(196,30,58,0.5);
    }
    .masthead .sub {
      font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.5em;
      color:var(--text-muted); text-transform:uppercase; margin-top:12px;
    }
    .section-title {
      font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.32em; text-transform:uppercase;
      color:var(--text-dim); margin:38px 0 16px; display:flex; align-items:center; gap:14px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:rgba(180,30,60,0.18); }
    .grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;
    }
    .card {
      background:rgba(10,4,18,0.85); border:1.5px solid var(--frame); border-radius:14px;
      padding:20px 14px; display:flex; flex-direction:column; align-items:center; gap:9px;
      text-align:center; position:relative; overflow:hidden;
      box-shadow:0 4px 18px rgba(0,0,0,0.5), 0 0 0 1px color-mix(in srgb, var(--frame) 28%, transparent), inset 0 0 26px color-mix(in srgb, var(--frame) 9%, transparent);
    }
    .card .halo {
      position:absolute; top:-30px; left:50%; transform:translateX(-50%);
      width:140px; height:140px; border-radius:50%; pointer-events:none;
      background:radial-gradient(circle, var(--frame) 0%, transparent 70%); opacity:0.14;
    }
    .emblem {
      width:74px; height:74px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:38px; line-height:1; position:relative;
      background:var(--rbg); border:2px solid color-mix(in srgb, var(--rc) 75%, transparent);
      box-shadow:0 0 22px color-mix(in srgb, var(--rc) 38%, transparent);
    }
    .name { font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--frame); line-height:1.15; position:relative; }
    .team { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); position:relative; }
    .hex { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--rc); opacity:0.85; position:relative; }
    .morph {
      font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:0.08em; text-transform:uppercase;
      color:#d4a017; background:rgba(212,160,23,0.1); border:1px solid rgba(212,160,23,0.4);
      border-radius:6px; padding:3px 7px; position:relative; line-height:1.3;
    }
    .applogo-row { display:flex; flex-wrap:wrap; gap:14px; }
    .applogo {
      flex:1; min-width:200px; background:rgba(196,30,58,0.08); border:1.5px solid rgba(196,30,58,0.4);
      border-radius:16px; padding:26px; display:flex; align-items:center; gap:20px;
    }
    .applogo .mj {
      font-family:'Cinzel',serif; font-size:54px; font-weight:900; letter-spacing:0.16em;
      color:var(--text); text-shadow:0 0 50px rgba(196,30,58,0.5); line-height:1;
    }
    .applogo .meta .t { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--text); }
    .applogo .meta .d { font-size:13px; color:var(--text-muted); font-style:italic; margin-top:3px; }
    .gameicon { font-size:46px; line-height:1; }
    .note { font-size:13px; color:var(--text-dim); font-style:italic; margin-top:14px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="masthead">
      <div class="mark">MJ</div>
      <div class="sub">Maître du Jeu · Planche des logos</div>
    </div>

    <div class="section-title">Logo de l'application</div>
    <div class="applogo-row" id="appRow"></div>

    <div class="section-title" id="t-village">Village</div>
    <div class="grid" data-team="village"></div>

    <div class="section-title" id="t-loup">Loups-Garous</div>
    <div class="grid" data-team="loupgarou"></div>

    <div class="section-title" id="t-solo">Solitaires &amp; indépendants</div>
    <div class="grid" data-team="solo"></div>

    <div class="note">Chaque rôle utilise son emblème (emoji) et sa couleur officielle dans toute l'application.</div>
  </div>

  <script src="js/gameData.js"></script>
  <script>
    var R = window.ROLES_DATA;
    var TEAM_LABEL = { village:'Village', loupgarou:'Loup-Garou', loupblanc:'Indépendant', solitaire:'Indépendant' };

    // App logo + game icon
    var games = window.GAMES_LIST || [];
    var appRow = document.getElementById('appRow');
    appRow.innerHTML =
      '<div class="applogo"><div class="mj">MJ</div><div class="meta"><div class="t">MJ — Maître du Jeu</div><div class="d">Application d\'animation de partie</div></div></div>' +
      games.map(function(g){
        return '<div class="applogo"><div class="gameicon">'+g.emoji+'</div><div class="meta"><div class="t">'+g.name+'</div><div class="d">'+g.description+'</div></div></div>';
      }).join('');

    function bucket(role){
      if (role.team === 'loupgarou') return 'loupgarou';
      if (role.team === 'village') return 'village';
      return 'solo'; // loupblanc + solitaire
    }

    // Couleur de CADRE par camp (tous les rôles d'un même camp partagent le cadre).
    // Seul le rond intérieur prend la couleur individuelle du rôle.
    var CAMP_FRAME = {
      village:   '#5c9eff', // Village
      loupgarou: '#ef4444', // Loups-Garous
      loupblanc: '#d4a017', // Indépendants
      solitaire: '#d4a017'  // Indépendants
    };
    function frameColor(team){ return CAMP_FRAME[team] || '#d4a017'; }

    var MORPH = {
      CHIEN_LOUP: '↻ peut rejoindre les Loups',
      ENFANT_SAUVAGE: '↻ peut devenir un Loup'
    };
    function card(role){
      var div = document.createElement('div');
      div.className = 'card';
      div.style.setProperty('--frame', frameColor(role.team));
      div.style.setProperty('--rc', role.color);
      div.style.setProperty('--rbg', role.bgColor);
      div.innerHTML =
        '<div class="halo"></div>' +
        '<div class="emblem">'+role.emoji+'</div>' +
        '<div class="name">'+role.name+'</div>' +
        '<div class="team">'+(TEAM_LABEL[role.team]||role.team)+'</div>' +
        '<div class="hex">'+role.color.toUpperCase()+'</div>' +
        (MORPH[role.id] ? '<div class="morph">'+MORPH[role.id]+'</div>' : '');
      return div;
    }

    var order = Object.keys(R);
    var grids = { village:document.querySelector('[data-team="village"]'), loupgarou:document.querySelector('[data-team="loupgarou"]'), solo:document.querySelector('[data-team="solo"]') };
    order.forEach(function(id){
      var role = R[id];
      grids[bucket(role)].appendChild(card(role));
    });
  </script>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#06030a"/>
      <text x="50" y="62" font-family="Georgia, serif" font-size="34" font-weight="900" fill="#f5efe8" text-anchor="middle" letter-spacing="3">MJ</text>
    </svg>
  </template>
</body>
</html>
